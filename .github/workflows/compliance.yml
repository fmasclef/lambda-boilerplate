name: compliance
on: push
jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: install Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "18"
      - name: build
        run: |
          npm install
          npm run lint
          npm run build
      - name: build
        run: |
          npm run test
